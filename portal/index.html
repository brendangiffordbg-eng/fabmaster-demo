<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — Fabmaster Customer Portal</title>
<meta name="robots" content="noindex">
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="portal.css">
</head>
<body class="login-body">
<div class="login-hero" aria-hidden="true"></div>
<div class="login-wrap">
  <form class="login-card" action="assets.html" method="get">
    <img src="../images/Fabmaster-Logo-New.jpg" alt="Fabmaster Welding">
    <h1>Customer Portal</h1>
    <span class="p-kicker">Fabmaster Maintenance Program</span>
    <label for="login-email">Email</label>
    <input type="email" id="login-email" value="dale@maplecreekgrain.ca" autocomplete="email">
    <label for="login-password">Password</label>
    <input type="password" id="login-password" value="demo-password" autocomplete="current-password">
    <button type="submit" class="btn btn-orange">Sign in</button>
    <p class="login-fine">Concept demo — any credentials open the sample account.</p>
    <a class="login-back" href="../index.html">&larr; Back to the program page</a>
  </form>
</div>
<footer class="p-foot mono">Demo portal &middot; Fabmaster Maintenance Program &middot; Concept &middot; Sample data</footer>
</body>
</html>
