<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="robots" content="noindex">
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="portal.css">
</head>
<body>
<header class="p-top">
  <div class="p-brand"><img src="../images/Fabmaster-Logo-New.jpg" alt="Fabmaster Welding"><span class="mono">portal.fabmaster.ca</span></div>
  <div class="p-user"><span class="p-cust">Maple Creek Grain Ltd.</span><a class="p-signout" href="index.html">Sign out</a></div>
</header>
<div class="p-shell">
  <nav class="p-nav" aria-label="Portal sections">
    <a href="assets.html">My Assets</a>
    <a href="reports.html">Inspection Reports</a>
    <a href="schedule.html">Upcoming PMIs</a>
    <a href="recommendations.html">Recommendations</a>
    <a class="on" href="documents.html">Documents</a>
    <a class="p-back" href="../index.html">&larr; Program page</a>
  </nav>
  <main class="p-main">
    <h1>Documents</h1>
    <span class="p-kicker">10 files &middot; Grouped by category</span>
    <div id="content"></div>
    <noscript><p>This demo portal renders its sample data with JavaScript — please enable it.</p></noscript>
  </main>
</div>
<footer class="p-foot mono">Demo portal &middot; Fabmaster Maintenance Program &middot; Concept &middot; Sample data</footer>
<script src="data.js"></script>
<script src="portal.js"></script>
<script>
  // Group documents by category, keeping categories in first-appearance order.
  (function () {
    var groups = PORTAL.documents.reduce(function (acc, doc) {
      if (!acc.byCat[doc.category]) {
        acc.byCat[doc.category] = [];
        acc.order.push(doc.category);
      }
      acc.byCat[doc.category].push(doc);
      return acc;
    }, { byCat: {}, order: [] });

    function docRow(doc) {
      var typeClass = doc.type === 'CSV' ? 'doc-type csv' : 'doc-type';
      // Inspection-report files open the real printable report; everything
      // else is honestly stubbed (those artifacts aren't built in the demo).
      var action = doc.reportId
        ? '<a class="doc-dl" href="report.html?id=' + encodeURIComponent(doc.reportId) + '">Open</a>'
        : '<a class="doc-dl" href="#" data-demo="Demo portal — this file isn\'t included in the concept. Inspection reports open as printable PDFs.">Download</a>';
      return '<div class="doc-row">' +
        '<span class="' + typeClass + '">' + doc.type + '</span>' +
        '<b>' + doc.name + '</b>' +
        '<span class="mono">' + doc.date + '</span>' +
        '<span class="mono">' + doc.size + '</span>' +
        action +
        '</div>';
    }

    var html = groups.order.map(function (cat) {
      return '<h2 class="doc-cat">' + cat + '</h2>' +
        groups.byCat[cat].map(docRow).join('');
    }).join('');

    document.getElementById('content').innerHTML = html;
  })();
</script>
</body>
</html>
